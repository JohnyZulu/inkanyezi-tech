<style>
  /* ── VARIABLES ── */
  :root {
    --ink-gold: #F4B942;
    --ink-orange: #FF6B35;
    --ink-dark: #04080F;
    --ink-navy: #0A1628;
  }

  /* ── PORTAL OVERLAY (door animation) ── */
  #ink-portal {
    position: fixed;
    inset: 0;
    z-index: 99990;
    pointer-events: none;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  #ink-portal.hidden { display: none; }

  /* Stars canvas behind doors */
  #ink-stars {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  /* ── DOOR PANELS ── */
  .ink-door {
    position: absolute;
    top: 0;
    width: 50%;
    height: 100%;
    background: linear-gradient(180deg, #0D1E3A 0%, #0A1628 45%, #060E1C 100%);
    overflow: hidden;
    transition: transform 0.65s cubic-bezier(0.77, 0, 0.175, 1);
    z-index: 1;
  }
  .ink-door-left  { left: 0;  transform-origin: left center; }
  .ink-door-right { right: 0; transform-origin: right center; }

  /* Open state */
  #ink-portal.open .ink-door-left  { transform: translateX(-101%); }
  #ink-portal.open .ink-door-right { transform: translateX(101%); }

  /* Centre glow seam */
  .ink-door-left::after,
  .ink-door-right::before {
    content: '';
    position: absolute;
    top: 0; bottom: 0;
    width: 3px;
    background: linear-gradient(
      180deg,
      transparent 0%,
      rgba(244,185,66,0.5) 15%,
      #FF6B35 50%,
      rgba(244,185,66,0.5) 85%,
      transparent 100%
    );
    box-shadow: 0 0 14px rgba(255,107,53,0.9), 0 0 35px rgba(255,107,53,0.35);
  }
  .ink-door-left::after  { right: 0; }
  .ink-door-right::before { left: 0; }

  /* Hex grid overlay */
  .ink-door-hex {
    position: absolute;
    inset: 0;
    opacity: 0.055;
    background-image:
      repeating-linear-gradient(60deg,  rgba(244,185,66,0.6) 0, rgba(244,185,66,0.6) 1px, transparent 0, transparent 50%),
      repeating-linear-gradient(120deg, rgba(244,185,66,0.6) 0, rgba(244,185,66,0.6) 1px, transparent 0, transparent 50%),
      repeating-linear-gradient(180deg, rgba(244,185,66,0.6) 0, rgba(244,185,66,0.6) 1px, transparent 0, transparent 50%);
    background-size: 28px 48px;
  }

  /* Scanlines */
  .ink-door-scan {
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 3px,
      rgba(8,18,36,0.18) 3px,
      rgba(8,18,36,0.18) 4px
    );
  }

  /* Constellation stars on doors */
  .ink-dstar {
    position: absolute;
    border-radius: 50%;
    background: rgba(244,185,66,0.75);
    animation: inkTwinkle 2s ease-in-out infinite;
  }
  @keyframes inkTwinkle {
    0%,100% { opacity: 0.25; transform: scale(1); }
    50%      { opacity: 1;    transform: scale(1.5); }
  }

  /* Horizontal circuit lines */
  .ink-tline {
    position: absolute;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(244,185,66,0.35), rgba(255,107,53,0.6), rgba(244,185,66,0.35), transparent);
    animation: inkScan 3s ease-in-out infinite;
    opacity: 0;
  }
  @keyframes inkScan {
    0%   { opacity: 0; transform: scaleX(0.1); }
    20%  { opacity: 1; transform: scaleX(1); }
    80%  { opacity: 1; transform: scaleX(1); }
    100% { opacity: 0; transform: scaleX(0.1); }
  }

  /* SA flag stripe at door bottom */
  .ink-door-flag {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, #007A4D 0%, #007A4D 20%, #FFB612 20%, #FFB612 40%, #DE3831 40%, #DE3831 60%, #002395 60%, #002395 80%, #FFFFFF 80%);
    opacity: 0.35;
  }

  /* ── BRAND CENTRE ── */
  .ink-brand {
    position: absolute;
    z-index: 5;
    text-align: center;
    pointer-events: none;
    animation: inkBrandIn 0.9s cubic-bezier(0.34,1.3,0.64,1) 0.1s forwards;
    opacity: 0;
  }
  @keyframes inkBrandIn {
    0%   { opacity: 0; transform: scale(0.6); }
    70%  { opacity: 1; transform: scale(1.04); }
    100% { opacity: 1; transform: scale(1); }
  }

  .ink-star-spin {
    display: block;
    font-size: 44px;
    margin-bottom: 10px;
    animation: inkSpin 8s linear infinite;
    filter: drop-shadow(0 0 16px rgba(244,185,66,0.9)) drop-shadow(0 0 40px rgba(255,107,53,0.45));
  }
  @keyframes inkSpin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  .ink-brand-name {
    font-family: 'Syne', 'Space Mono', monospace;
    font-weight: 800;
    font-size: 16px;
    color: #FFFFFF;
    letter-spacing: 0.18em;
    text-shadow: 0 0 24px rgba(244,185,66,0.7);
  }

  .ink-brand-sub {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    color: rgba(244,185,66,0.65);
    letter-spacing: 0.28em;
    margin-top: 7px;
    text-transform: uppercase;
  }

  /* Portal rings */
  .ink-ring {
    position: absolute;
    border-radius: 50%;
    border: 1px solid rgba(244,185,66,0.12);
    animation: inkRing 0.7s ease-out forwards;
    opacity: 0;
    z-index: 0;
  }
  @keyframes inkRing {
    from { opacity: 0; transform: scale(0.2); }
    to   { opacity: 1; transform: scale(1); }
  }

  /* Loading bar */
  .ink-loadbar {
    position: absolute;
    bottom: 28%;
    left: 50%;
    transform: translateX(-50%);
    width: 160px;
    z-index: 5;
    animation: inkBrandIn 0.9s ease 0.25s forwards;
    opacity: 0;
  }
  .ink-loadbar-track {
    height: 2px;
    background: rgba(244,185,66,0.12);
    border-radius: 2px;
    overflow: hidden;
  }
  .ink-loadbar-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #F4B942, #FF6B35);
    border-radius: 2px;
    box-shadow: 0 0 8px rgba(255,107,53,0.5);
    animation: inkFill 0.9s ease-out 0.5s forwards;
  }
  @keyframes inkFill {
    from { width: 0%; }
    to   { width: 100%; }
  }
  .ink-loadbar-text {
    text-align: center;
    font-family: 'Space Mono', monospace;
    font-size: 8px;
    color: rgba(244,185,66,0.45);
    letter-spacing: 0.2em;
    margin-top: 7px;
    text-transform: uppercase;
  }

  /* Flash on reveal */
  .ink-flash {
    position: absolute;
    inset: 0;
    background: rgba(244,185,66,0.07);
    z-index: 10;
    pointer-events: none;
    opacity: 0;
    animation: inkFlash 0.35s ease-out 1.55s forwards;
  }
  @keyframes inkFlash {
    0%   { opacity: 0.5; }
    100% { opacity: 0; }
  }

  /* Fade out entire portal after doors open */
  #ink-portal.fading {
    transition: opacity 0.4s ease;
    opacity: 0;
  }

  /* ── CHAT BUTTON ── */
  #ink-fab {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 99980;
    width: 62px;
    height: 62px;
    border-radius: 50%;
    background: linear-gradient(135deg, #FF6B35, #c2410c);
    border: 2px solid rgba(249,115,22,0.45);
    cursor: pointer;
    font-size: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 30px rgba(249,115,22,0.5), 0 0 60px rgba(249,115,22,0.2);
    animation: inkFloat 3s ease-in-out infinite;
    transition: transform 0.2s, box-shadow 0.2s;
    font-family: sans-serif;
  }
  #ink-fab:hover {
    transform: scale(1.08);
    box-shadow: 0 0 40px rgba(249,115,22,0.7), 0 0 80px rgba(249,115,22,0.3);
    animation-play-state: paused;
  }
  @keyframes inkFloat {
    0%,100% { transform: translateY(0) scale(1); }
    50%      { transform: translateY(-6px) scale(1.03); }
  }

  .ink-fab-orbit {
    position: absolute;
    width: 62px; height: 62px;
    animation: inkOrbit 4s linear infinite;
    pointer-events: none;
  }
  @keyframes inkOrbit {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }
  .ink-fab-dot {
    position: absolute;
    top: -3px; left: 50%;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #F4B942;
    transform: translateX(-50%);
    box-shadow: 0 0 10px #F4B942;
  }

  /* ── CHAT IFRAME ── */
  #ink-iframe {
    position: fixed;
    right: 24px;
    z-index: 99970;
    border: none;
    border-radius: 18px;
    box-shadow: 0 12px 60px rgba(0,0,0,0.55), 0 0 0 1px rgba(244,185,66,0.15);
    display: none;
    overflow: hidden;

    /* Responsive — clamps so top never disappears */
    bottom: 96px;
    width: 400px;
    height: min(640px, calc(100dvh - 110px));
  }

  /* Laptop / short screens */
  @media (max-height: 768px) {
    #ink-iframe {
      height: calc(100dvh - 100px);
      bottom: 86px;
    }
  }

  /* Mobile */
  @media (max-width: 480px) {
    #ink-iframe {
      right: 0; left: 0; bottom: 0;
      width: 100%;
      height: 100dvh;
      border-radius: 0;
    }
    #ink-fab {
      bottom: 16px;
      right: 16px;
    }
  }

  /* Tablet */
  @media (max-width: 768px) and (min-width: 481px) {
    #ink-iframe {
      width: calc(100vw - 48px);
      max-width: 400px;
    }
  }

  .ink-iframe-open {
    display: block !important;
    animation: inkSlideUp 0.3s cubic-bezier(0.34,1.4,0.64,1) forwards;
  }
  @keyframes inkSlideUp {
    from { opacity: 0; transform: translateY(20px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
</style>

<script>
(function() {
  /* ── Star field ── */
  var canvas = document.getElementById('ink-stars');
  var ctx = canvas.getContext('2d');

  function resizeStars() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resizeStars();
  window.addEventListener('resize', resizeStars);

  var stars = [];
  for (var i = 0; i < 130; i++) {
    stars.push({
      x: Math.random(),
      y: Math.random(),
      r: Math.random() * 1.4 + 0.3,
      phase: Math.random() * Math.PI * 2,
      speed: Math.random() * 0.009 + 0.003
    });
  }

  var animId;
  function drawStars(t) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (var i = 0; i < stars.length; i++) {
      var s = stars[i];
      var a = ((Math.sin(t * s.speed + s.phase) + 1) / 2) * 0.7 + 0.1;
      ctx.beginPath();
      ctx.arc(s.x * canvas.width, s.y * canvas.height, s.r, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(244,185,66,' + a.toFixed(2) + ')';
      ctx.fill();
    }
    animId = requestAnimationFrame(drawStars);
  }
  animId = requestAnimationFrame(drawStars);

  /* ── Loading text ticker ── */
  var loadMsgs = ['Connecting to network', 'Loading AI core', 'Ready'];
  var loadIdx  = 0;
  var loadTicker = setInterval(function() {
    loadIdx = (loadIdx + 1) % loadMsgs.length;
    var el = document.getElementById('ink-load-txt');
    if (el) el.textContent = loadMsgs[loadIdx];
  }, 380);

  /* ── Auto-open doors after 1500ms ── */
  var portalDone = false;
  setTimeout(function() {
    if (portalDone) return;
    portalDone = true;
    var portal = document.getElementById('ink-portal');
    portal.classList.add('open');
    clearInterval(loadTicker);
    setTimeout(function() {
      portal.classList.add('fading');
      cancelAnimationFrame(animId);
      setTimeout(function() {
        portal.classList.add('hidden');
      }, 420);
    }, 700);
  }, 1500);

  /* ── Chat toggle ── */
  var chatOpen = false;
  window.inkToggleChat = function() {
    chatOpen = !chatOpen;
    var iframe = document.getElementById('ink-iframe');
    var icon   = document.getElementById('ink-fab-icon');
    if (chatOpen) {
      iframe.classList.add('ink-iframe-open');
      icon.textContent = '✕';
    } else {
      iframe.classList.remove('ink-iframe-open');
      iframe.style.display = 'none';
      setTimeout(function() {
        if (!chatOpen) iframe.style.display = '';
      }, 10);
      icon.textContent = '⭐';
    }
  };

  /* Close on Escape */
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && chatOpen) window.inkToggleChat();
  });
})();
</script>
